name: Publish on release

on:
    workflow_dispatch:
    push:
        tags:
            - 'v[0-9]*.[0-9]*.[0-9]'
            - 'v[0-9]*.[0-9]*.[0-9]-*'
            - 'v[0-9]*.[0-9]*.[0-9]+*'

permissions:
    contents: write

jobs:
    build:
        runs-on: ubuntu-24.04
        outputs:
            last_tag: ${{ steps.tags.outputs.LAST_TAG }}
            prev_tag: ${{ steps.tags.outputs.PREV_TAG }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                fetch-depth: 0

            - name: Detect tags
              id: tags
              run: |
                ALL_TAGS=$(git tag --sort=-creatordate | grep -E '^v*')
                LAST_TAG=$(echo "$ALL_TAGS" | sed -n '1p')
                PREV_TAG=$(echo "$ALL_TAGS" | sed -n '2p')
                echo "LAST_TAG=$LAST_TAG" >> $GITHUB_OUTPUT
                echo "PREV_TAG=$PREV_TAG" >> $GITHUB_OUTPUT

            - name: Setup JDK
              uses: actions/setup-java@v4
              with:
                java-version: 25
                distribution: microsoft

            - name: Build project
              run: |
                chmod +x ./gradlew
                ./gradlew build

            - name: Upload build artifacts
              uses: actions/upload-artifact@v4
              with:
                name: build-libs
                path: build/libs/*
                if-no-files-found: ignore

            - name: Cleanup artifacts
              run: rm -f build/libs/*-sources.jar build/libs/*-javadoc.jar

            - name: Generate release title
              id: release_title
              run: |
                TAG_NAME="${{ steps.tags.outputs.LAST_TAG }}"
                if [[ "$TAG_NAME" == *"+"* ]]; then
                    # substring after the last "+" character and before the first "-" character
                    TAG_NAME=$(echo "$TAG_NAME" | sed -E 's/.*\+([^+-]+).*/\1/')
                    echo "Minecraft version detected in tag: $TAG_NAME"
                    echo "TITLE=$TAG_NAME" >> $GITHUB_OUTPUT
                else
                    echo "No Minecraft version detected in tag, using full tag as title: $TAG_NAME"
                    echo "TITLE=$TAG_NAME" >> $GITHUB_OUTPUT
                fi

            - name: Generate release body
              id: release_body
              run: |
                REPO_URL="https://github.com/${{ github.repository }}"
                L_TAG="${{ steps.tags.outputs.LAST_TAG }}"
                P_TAG="${{ steps.tags.outputs.PREV_TAG }}"

                if [ -z "$P_TAG" ]; then
                    GIT_LOG=$(git log "$L_TAG" --pretty=format:"- [#%h]($REPO_URL/commit/%h): %s")
                    CHANGELOG_URL="$REPO_URL/releases/tag/$L_TAG"
                else
                    GIT_LOG=$(git log "$P_TAG..$L_TAG" --pretty=format:"- [#%h]($REPO_URL/commit/%h): %s")
                    CHANGELOG_URL="$REPO_URL/compare/$P_TAG...$L_TAG"
                fi

                echo "**Full Changelog**: $CHANGELOG_URL" > release_body.md
                echo "" >> release_body.md
                echo "$GIT_LOG" >> release_body.md

            - name: Create release with assets
              uses: softprops/action-gh-release@v3
              with:
                tag_name: ${{ steps.tags.outputs.LAST_TAG }}
                name: ${{ steps.release_title.outputs.TITLE }}
                body_path: release_body.md
                files: build/libs/*
                prerelease: ${{ contains(steps.tags.outputs.LAST_TAG, '-beta') || contains(steps.tags.outputs.LAST_TAG, '-alpha') }}
              env:
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
