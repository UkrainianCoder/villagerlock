name: Build project

on:
    pull_request:
    push:
        branches:
            - main

jobs:
    build:
        runs-on: ubuntu-24.04
        steps:
            -   name: Checkout
                uses: actions/checkout@v4
                with:
                    fetch-depth: 0

            -   name: Setup JDK
                uses: actions/setup-java@v4
                with:
                    java-version: 25
                    distribution: microsoft

            -   name: Build project
                run: |
                    chmod +x ./gradlew
                    ./gradlew build
